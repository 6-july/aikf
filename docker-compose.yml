services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: uu-runner-ai-postgres
    environment:
      POSTGRES_DB: uu_runner_ai_cs
      POSTGRES_USER: uu_runner
      POSTGRES_PASSWORD: uu_runner_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uu_runner -d uu_runner_ai_cs"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:

